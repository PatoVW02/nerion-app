name: Release (Windows)

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest
    env:
      VITE_MONTHLY_CHECKOUT_URL: ${{ vars.VITE_MONTHLY_CHECKOUT_URL }}
      VITE_LIFETIME_CHECKOUT_URL: ${{ vars.VITE_LIFETIME_CHECKOUT_URL }}
      VITE_MONTHLY_VARIANT_ID: ${{ vars.VITE_MONTHLY_VARIANT_ID }}
      VITE_LIFETIME_VARIANT_ID: ${{ vars.VITE_LIFETIME_VARIANT_ID }}
      CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Lint native scanner
        run: cargo clippy --manifest-path native/scanner-rs/Cargo.toml --all-targets -- -D warnings

      - name: Verify tag and package version match
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          if ("v$version" -ne $env:GITHUB_REF_NAME) {
            throw "Tag $env:GITHUB_REF_NAME does not match package version $version"
          }

      - name: Verify billing build configuration
        run: node scripts/validate-checkout-urls.mjs

      - name: Detect optional Windows Authenticode credentials
        shell: pwsh
        run: |
          $hasCertificate = -not [string]::IsNullOrWhiteSpace($env:CSC_LINK)
          $hasPassword = -not [string]::IsNullOrWhiteSpace($env:CSC_KEY_PASSWORD)
          if ($hasCertificate -xor $hasPassword) {
            throw "Configure both WINDOWS_CSC_LINK and WINDOWS_CSC_KEY_PASSWORD, or leave both unset for an unsigned Windows build."
          }
          $signingEnabled = $hasCertificate -and $hasPassword
          $signingValue = $signingEnabled.ToString().ToLowerInvariant()
          "WINDOWS_SIGNING_ENABLED=$signingValue" >> $env:GITHUB_ENV
          "CSC_IDENTITY_AUTO_DISCOVERY=$signingValue" >> $env:GITHUB_ENV
          if ($signingEnabled) {
            Write-Host "Windows Authenticode signing is enabled."
          } else {
            Write-Warning "Windows certificate is not configured; publishing an unsigned installer."
          }

      - name: Build Windows scanner
        run: npm run build:scanner:win:x64

      - name: Build app bundles
        run: npm run build

      - name: Package Windows release
        run: npx electron-builder --win nsis --x64 --publish never

      - name: Verify Authenticode signatures
        if: env.WINDOWS_SIGNING_ENABLED == 'true'
        shell: pwsh
        run: |
          $signedFiles = @(
            "dist/Nerion-x64.exe",
            "dist/win-unpacked/Nerion.exe",
            "dist/win-unpacked/resources/scanner-bin.exe"
          )
          foreach ($file in $signedFiles) {
            if (-not (Test-Path $file)) { throw "Missing signed Windows file: $file" }
            $signature = Get-AuthenticodeSignature $file
            if ($signature.Status -ne "Valid" -or $null -eq $signature.SignerCertificate) {
              throw "Invalid Authenticode signature for $file ($($signature.Status))."
            }
          }

      - name: Attach Windows assets to the verified source tag
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $releaseReady = $false
          for ($attempt = 0; $attempt -lt 60; $attempt++) {
            gh release view $env:GITHUB_REF_NAME *> $null
            if ($LASTEXITCODE -eq 0) {
              $releaseReady = $true
              break
            }
            Start-Sleep -Seconds 5
          }
          if (-not $releaseReady) {
            throw "The macOS release was not created for $env:GITHUB_REF_NAME within five minutes."
          }

          $required = @(
            "dist/Nerion-x64.exe",
            "dist/Nerion-x64.exe.blockmap",
            "dist/latest.yml"
          )
          foreach ($asset in $required) {
            if (-not (Test-Path $asset)) { throw "Missing Windows release asset: $asset" }
          }

          gh release upload $env:GITHUB_REF_NAME $required --clobber
          if ($LASTEXITCODE -ne 0) { throw "Failed to upload Windows release assets." }
